apiVersion: las.installspec/v0.1.2
kind: InstallPlan

id: hf
category: tool

supported_platforms:
  - linux/amd64
  - linux/arm64
  - windows/amd64

install_modes:
  - python

tools_required:
  - python3
  - pip

description:
  purpose: Install the Hugging Face Hub CLI (hf)
  scope:
    - install
    - verify
    - uninstall
  non_goals:
    - configure authentication
    - manage system-wide Python versions

dependencies:
  system:
    - python3
    - python3-pip

preconditions: []

decision_matrix:
  default: python

install:
  python:
    - id: S10
      intent: Install Hugging Face Hub CLI via pip
      tool: shell
      command: bash scripts/install.sh
      expected:
        exit_code: 0
      idempotent: true
    - id: S20
      intent: Verify CLI module entrypoint
      tool: shell
      command: >-
        python3 -c "import importlib.metadata as md; eps = md.entry_points();
        group = eps.select(group='console_scripts') if hasattr(eps, 'select') else
        eps.get('console_scripts', []); names = {ep.name for ep in group}; assert
        names & {'hf', 'huggingface-cli'}, f'Expected hf or huggingface-cli console
        script, found: {sorted(names)}'"
      expected:
        exit_code: 0
      idempotent: true

configuration:
  required: false
  defaults: {}
  templates: []

verification:
  script: scripts/verify.sh

rollback:
  script: scripts/uninstall.sh

uninstall:
  script: scripts/uninstall.sh

security:
  network:
    bind: localhost
    auth: token
  privileges:
    requires_sudo: false
