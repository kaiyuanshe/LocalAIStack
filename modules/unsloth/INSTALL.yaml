apiVersion: las.installspec/v0.1.2
kind: InstallPlan

id: unsloth
category: framework

supported_platforms:
  - linux/amd64
  - linux/arm64
  - windows/amd64

install_modes:
  - python

tools_required:
  - python3
  - pip

description:
  purpose: Install the Unsloth Python framework
  scope:
    - install
    - verify
    - rollback
    - uninstall
    - purge
  non_goals:
    - auto-detect the optimal torch and CUDA wheel combination
    - configure GPU drivers, CUDA toolkit, or Python virtual environments

dependencies:
  system:
    - python3
    - python3-pip

preconditions: []

decision_matrix:
  default: python

install:
  python:
    - id: S10
      intent: Install Unsloth via the official pip package
      tool: shell
      command: bash scripts/install.sh
      expected:
        exit_code: 0
      idempotent: true

configuration:
  required: false
  defaults: {}
  templates: []

verification:
  script: scripts/verify.sh

rollback:
  script: scripts/rollback.sh

uninstall:
  script: scripts/uninstall.sh

purge:
  script: scripts/purge.sh
  destructive: true

security:
  network:
    bind: localhost
    auth: n/a
  privileges:
    requires_sudo: false
