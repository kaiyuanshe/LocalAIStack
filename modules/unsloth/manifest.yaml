name: unsloth
category: framework
version: 0.1.0
description: Unsloth fine-tuning and reinforcement learning framework for large language models
license: LGPL-3.0

hardware:
  cpu:
    cores_min: 4
  memory:
    ram_min: 8GB
  gpu:
    vram_min: 8GB
    multi_gpu: false

dependencies:
  system:
    - python3
    - python3-pip

runtime:
  modes:
    - native
  preferred: native

interfaces:
  provides:
    - llm_finetuning_framework
