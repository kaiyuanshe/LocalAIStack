apiVersion: las.installspec/v0.1.2
kind: InstallPlan

id: openclaw
category: tools

supported_platforms:
  - linux/amd64
  - linux/arm64
  - windows/amd64

install_modes:
  - native

rebuild_modes:
  - none
  - soft
  - full

tools_required:
  - curl

description:
  purpose: Install the OpenClaw CLI
  scope:
    - install
    - configure
    - verify
    - rollback
    - uninstall
    - purge

dependencies:
  system:
    - curl
    - ca-certificates
    - python3

preconditions: []

decision_matrix:
  default: native
  rules: []

environment_rebuild:
  detect:
    - id: R10
      intent: Detect existing OpenClaw binary
      tool: shell
      command: |
        bash -euo pipefail <<'SH'
        NVM_DIR="${NVM_DIR:-${HOME}/.nvm}"

        if command -v openclaw >/dev/null 2>&1; then
          exit 0
        fi

        for candidate in \
          "${HOME}/.local/bin/openclaw" \
          "/usr/local/bin/openclaw" \
          "/root/.local/bin/openclaw"; do
          if [[ -x "$candidate" ]]; then
            exit 0
          fi
        done

        if [[ -s "${NVM_DIR}/nvm.sh" ]]; then
          # shellcheck disable=SC1090
          source "${NVM_DIR}/nvm.sh"
          if command -v openclaw >/dev/null 2>&1; then
            exit 0
          fi
          if [[ "$(nvm version default 2>/dev/null || true)" != "N/A" ]]; then
            nvm use default >/dev/null 2>&1 || true
            if command -v openclaw >/dev/null 2>&1; then
              exit 0
            fi
          fi
        fi

        if find "${NVM_DIR}/versions/node" -maxdepth 4 -type f -path '*/bin/openclaw' 2>/dev/null | grep -q .; then
          exit 0
        fi

        exit 1
        SH
      expected:
        exit_code: 0
  soft_cleanup:
    - id: C10
      intent: Remove OpenClaw binary
      tool: shell
      command: bash scripts/uninstall.sh
      expected:
        exit_code: 0
  full_cleanup:
    - id: C20
      intent: Remove OpenClaw binary and local data
      tool: shell
      command: bash scripts/purge.sh
      expected:
        exit_code: 0

install:
  native:
    - id: S10
      intent: Install OpenClaw via official installer or package manager fallback
      tool: shell
      command: bash scripts/install.sh
      expected:
        bin: openclaw
      idempotent: true
    - id: S20
      intent: Configure local providers for OpenClaw
      tool: shell
      command: bash scripts/configure_local.sh
      expected:
        exit_code: 0
      idempotent: true

verification:
  script: scripts/verify.sh

rollback:
  script: scripts/uninstall.sh

update:
  script: scripts/update.sh

uninstall:
  script: scripts/uninstall.sh

purge:
  script: scripts/purge.sh
  destructive: true

security:
  network:
    bind: n/a
    auth: n/a
  privileges:
    requires_sudo: true
